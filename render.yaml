services:
  - type: web
    name: biohuerta-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --timeout 120
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: RENDER_EXTERNAL_URL
        value: https://biohuerta-api.onrender.com
